<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <script>
            var word="Himansh";
            document.write(word.toUpperCase());
            document.write("<br>");
            document.write(word.toLowerCase());
            document.write("<br>");
            document.write(word.startsWith("h"));
            document.write("<br>");
            document.write(word.endsWith("h"));

            var fruits=["apple","mango","banana"];
            for(var count=0; count < fruits.length;count++){
                document.write(fruits[count]);
                document.write("<br>");
            }
            document.write("<br>");
            var day="";
            switch( new Date().getDay()){
                case 0:
                    day="sunday";
                    break;
                case 1:
                    day="monday";
                    break;
                case 2:
                    day="tuesday";
                    break;
                case 3:
                    day="wednesday"
                    break;
                case 4:
                    day="thursday";
                    break;
                case 5:
                    day="friday";
                    break;
                case 6:
                    day="saturday"
                    break;
            }
            document.write(day);
        </script>
    </body>
</html>
