<!DOCTYPE html>
<html>
<head>
    <title>gradientss</title>
    <style>
        .box1{
            width: 500px;
            height:200px;
            background:linear-gradient(red, orange, yellow, green, blue, indigo, violet) ;
        }
        .box2{
            width: 500px;
            height:200px;
            background:radial-gradient(red, orange, yellow, green, blue, indigo, violet) ;
        }
    </style>
</head>
<body>
    <div class="box1">
        linear gradient
    </div>
    <div class="box2">
        radial gradient
    </div>
</body>
</html>
