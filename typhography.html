<!DOCTYPE html>
<html>
    <head>
        <title>Typography</title>
        <style>
            h1{
                font-family: cursive;
                font-weight: 67;
                text-decoration: underline;
                text-decoration-color:blue ;
                text-transform: uppercase;
                text-indent: 50px;
                color: aqua;
                text-shadow: 1px 3px 4px orangered;
                transform:rotateY(65deg)
            }
            p{
                font-size: xx-large;
            }
            div{
                width: 100px;
                height: 100px;
                box-shadow: inset 5px 5px 5px orchid;

            }
        </style>
    </head>
    <body>
        <h1>heHIing 1</h1>
        <p>This is a paragraph.</p>
        <div>I am box</div>
    </body>
</html>
