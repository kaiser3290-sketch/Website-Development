<!DOCTYPE html>
<html>
    <head>
        <title>Gradient</title>
        <style>
            .box1{
                width: 350px;
                height:350px;
                background:linear-gradient(45deg,red,orange,blue) ;
            }
            .box2{
                width: 350px;
                height:350px;
                background:radial-gradient(circle closest-side,red,orange,blue) ;
            }
        </style>
    </head>
    <body>
        <div class="box1">
            linear gradient
        </div>
        <div class="box2">
            radial gradient
        </div>
    </body>
</html>
