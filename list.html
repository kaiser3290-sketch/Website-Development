<!DOCTYPE html>
<html>
    <head>
        <title>learning about list</title>
    </head>
    <body>
        <h1>Ordered list</h1>
        <ol>
            <li>apple</li>
            <li>banana</li>
            <li>orange</li>
        </ol>
        <h1>unordered list</h1>
        <ul>
            <li>watermelon</li>
            <li>mango</li>
            <li>litchi</li>
        </ul>
    </body>
</html>
